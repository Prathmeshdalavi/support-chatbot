<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register - Support Portal</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            margin: 0;
        }
        .register-card {
            background: #ffffff;
            border-radius: 1rem;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 420px;
            padding: 2rem;
        }
    </style>
</head>
<body>

<div class="register-card">
    <div class="text-center mb-4">
        <h3 class="fw-bold text-dark">Create Account</h3>
        <p class="text-muted small">Register your new support portal credentials</p>
    </div>

    <form th:action="@{/register}" method="post">
        <div class="mb-3">
            <label for="username" class="form-label small fw-medium text-secondary">Username</label>
            <input type="text" id="username" name="username" class="form-control rounded-3" placeholder="Choose a username" required>
        </div>
        <div class="mb-3">
            <label for="password" class="form-label small fw-medium text-secondary">Password</label>
            <input type="password" id="password" name="password" class="form-control rounded-3" placeholder="Create strong password" required>
        </div>
        <div class="mb-4">
            <label for="role" class="form-label small fw-medium text-secondary">Account Permission Type</label>
            <select id="role" name="role" class="form-select rounded-3">
                <option value="USER">Standard User (Chat Access)</option>
                <option value="ADMIN">Administrator (Audit View)</option>
            </select>
        </div>
        <button type="submit" class="btn btn-success w-100 py-2 rounded-3 fw-medium">Complete Registration</button>
    </form>

    <div class="text-center mt-4">
        <p class="text-muted small mb-0">Already registered? <a href="/login" class="text-decoration-none fw-medium">Sign in instead</a></p>
    </div>
</div>

</body>
</html>
