<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>AI Agent Support Portal</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>

    <style>
        * {
            box-sizing: border-box;
        }

        body, html {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            /* Fixes variable mobile viewport calculation issues */
            height: 100dvh; 
            overflow: hidden;
        }

        /* Root Layout Base Matrix */
        .app-container {
            display: grid;
            grid-template-columns: 260px 1fr;
            width: 100vw;
            height: 100%;
            position: relative;
        }

        /* ==========================================
           SIDEBAR PANEL ARCHITECTURE
           ========================================== */
        .sidebar {
            background-color: #1e293b;
            color: #f8fafc;
            display: grid;
            grid-template-rows: auto 1fr auto;
            padding: 1.5rem;
            height: 100%;
            border-right: 1px solid #334155;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1050;
        }

        .sidebar-menu-list {
            overflow-y: auto;
            margin-top: 1.5rem;
        }

        /* ==========================================
           MAIN CHAT GRID INTERFACE
           ========================================== */
        .chat-main-interface {
            display: grid;
            grid-template-rows: auto 1fr auto;
            height: 100%;
            background-color: #ffffff;
            position: relative;
            min-width: 0; /* Fixes text container breakage over flex layouts */
        }

        .chat-header {
            background-color: #ffffff;
            border-bottom: 1px solid #e2e8f0;
            padding: 1rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        /* SCROLLABLE CHAT BUBBLE BOX */
        #chat-box {
            background-color: #f8fafc;
            overflow-y: auto;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        /* Adaptive Responsive Chat Message Blocks */
        .msg {
            max-width: 75%;
            padding: 0.85rem 1.25rem;
            border-radius: 1.25rem;
            font-size: 0.95rem;
            line-height: 1.5;
            box-shadow: 0 1px 3px rgba(15, 23, 42, 0.05);
            word-wrap: break-word;
            word-break: break-word;
        }

        .msg.user {
            background-color: #2563eb;
            color: #ffffff;
            align-self: flex-end;
            border-bottom-right-radius: 0.25rem;
        }

        .msg.ai {
            background-color: #ffffff;
            color: #1e293b;
            align-self: flex-start;
            border-bottom-left-radius: 0.25rem;
            border: 1px solid #e2e8f0;
        }

        .msg p { margin-bottom: 0; }
        
        pre { 
            background-color: #0f172a; 
            padding: 1rem; 
            border-radius: 0.5rem; 
            margin-top: 0.5rem; 
            overflow-x: auto;
            max-width: 100%;
        }
        code { font-size: 0.85rem; white-space: pre-wrap; word-break: break-all; }

        /* FIXED BOTTOM INPUT PANEL */
        .chat-footer {
            background-color: #ffffff;
            border-top: 1px solid #e2e8f0;
            padding: 1rem 1.5rem;
        }

        .input-bar-wrapper {
            background-color: #f1f5f9;
            border: 1px solid #cbd5e1;
            border-radius: 0.75rem;
            padding: 0.35rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            width: 100%;
        }

        .input-bar-wrapper input {
            border: none !important;
            background: transparent !important;
            box-shadow: none !important;
            padding: 0.5rem;
            font-size: 0.95rem;
            flex-grow: 1;
        }

        /* ==========================================
           UNIVERSAL DEVICES RESPONSIVE QUERIES
           ========================================== */
        @media (max-width: 991px) {
            .app-container {
                grid-template-columns: 1fr; /* Drop multi-column structure */
            }

            .sidebar {
                position: absolute;
                left: 0;
                top: 0;
                width: 280px;
                transform: translateX(-100%); /* Slide completely off-screen safely */
            }

            .sidebar.active {
                transform: translateX(0); /* Clean layout presentation */
            }

            .msg {
                max-width: 88%; /* Give chat texts more surface area on smaller viewports */
            }
            
            .chat-header, .chat-footer {
                padding: 0.75rem 1rem;
            }
        }

        /* Backdrop Layer Screen Mask Container */
        .screen-overlay {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100%;
            background: rgba(15, 23, 42, 0.5);
            backdrop-filter: blur(2px);
            z-index: 1040;
        }
        
        .screen-overlay.active {
            display: block;
        }
    </style>
</head>

<body>

    <div class="app-container">
        
        <div class="sidebar" id="sidebarMenu">
            <div class="d-flex justify-content-between align-items-center">
                <h5 class="fw-bold text-white m-0">⚡ Neon AI</h5>
                <button class="btn-close btn-close-white d-lg-none" onclick="toggleSidebarMenu()"></button>
            </div>
            
            <div class="sidebar-menu-list">
                <div class="mb-4">
                    <small class="text-uppercase text-muted d-block mb-1 font-monospace" style="font-size:0.7rem; letter-spacing: 1px;">Active Operator</small>
                    <span class="fw-semibold text-light fs-5" th:text="${username}">User</span>
                </div>
            </div>
            
            <div class="d-grid gap-2 pt-3 border-top border-secondary">
                <button id="clearChatBtn" onclick="clearChatHistory()" class="btn btn-outline-danger w-100 fw-medium">
                    🗑️ Clear History
                </button>
                <a href="/logout" class="btn btn-danger w-100 fw-medium">Logout</a>
            </div>
        </div>

        <div class="chat-main-interface">
            
            <div class="chat-header shadow-sm">
                <div class="d-flex align-items-center">
                    <button class="btn btn-dark me-3 px-2 py-1 d-lg-none" onclick="toggleSidebarMenu()">
                        ☰ Menu
                    </button>
                    <div>
                        <h6 class="fw-bold mb-0 text-dark">Live AI Chat Agent</h6>
                        <small class="text-success font-monospace" style="font-size:0.8rem; display: flex; align-items: center; gap: 4px;">
                            <span style="height: 8px; width: 8px; background-color: #22c55e; border-radius: 50%; display: inline-block;"></span> 
                            Groq Engine Active
                        </small>
                    </div>
                </div>
            </div>

            <div id="chat-box">
                <div th:each="msg : ${history}" 
                     th:class="${msg.sender == 'USER'} ? 'msg user' : 'msg ai'"
                     th:data-sender="${msg.sender}"
                     class="markdown-content"
                     th:text="${msg.content}">
                </div>
            </div>

            <div class="chat-footer">
                <div class="input-bar-wrapper shadow-sm">
                    <input type="text" id="user-input" class="form-control" placeholder="Type your message here..." autocomplete="off">
                    <button class="btn btn-primary px-4 py-2 rounded-3 fw-semibold shadow-sm" onclick="sendMessage()">Send</button>
                </div>
            </div>
            
        </div>
    </div>

    <div class="screen-overlay" id="uiMaskLayer" onclick="toggleSidebarMenu()"></div>

    <script>
        let stompClient = null;

        function toggleSidebarMenu() {
            const sidebar = document.getElementById("sidebarMenu");
            const mask = document.getElementById("uiMaskLayer");
            
            sidebar.classList.toggle("active");
            mask.classList.toggle("active");
        }

        function connect() {
            const socket = new SockJS('/ws-chat');
            stompClient = Stomp.over(socket);
            stompClient.debug = null; // Turns off console logging spam
            stompClient.connect({}, function (frame) {
                stompClient.subscribe('/user/queue/messages', function (msgOutput) {
                    const msg = JSON.parse(msgOutput.body);
                    renderMessage(msg.content, msg.sender);
                });
            });
        }

        function sendMessage() {
            const input = document.getElementById("user-input");
            const val = input.value.trim();
            if (val && stompClient) {
                const messagePayload = { 'content': val, 'sender': 'USER' };
                stompClient.send("/app/chat.sendMessage", {}, JSON.stringify(messagePayload));
                renderMessage(val, 'USER');
                input.value = "";
            }
        }

        function clearChatHistory() {
            if (confirm("Permanently wipe all database chat logs for this account?")) {
                fetch('/api/chat/clear', { method: 'DELETE' })
                .then(response => {
                    if (response.ok) {
                        document.getElementById("chat-box").innerHTML = "";
                        if(window.innerWidth < 992) toggleSidebarMenu();
                    }
                });
            }
        }

        function renderMessage(content, sender) {
            const chatContainer = document.getElementById("chat-box");
            
            if (sender === "USER") {
                const liveNodes = chatContainer.querySelectorAll('.msg.user');
                if (liveNodes.length > 0 && liveNodes[liveNodes.length - 1].textContent === content) return;
            }

            const bubbleElement = document.createElement("div");
            bubbleElement.className = sender === "USER" ? "msg user" : "msg ai";

            if (sender === "AI") {
                bubbleElement.innerHTML = marked.parse(content);
            } else {
                bubbleElement.textContent = content;
            }

            chatContainer.appendChild(bubbleElement);
            
            bubbleElement.querySelectorAll('pre code').forEach((block) => {
                hljs.highlightElement(block);
            });

            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function parseExistingHistory() {
            document.querySelectorAll(".markdown-content").forEach(el => {
                const sender = el.getAttribute("data-sender");
                if (sender === "AI") {
                    const rawText = el.textContent;
                    el.innerHTML = marked.parse(rawText);
                    el.querySelectorAll('pre code').forEach((block) => {
                        hljs.highlightElement(block);
                    });
                }
            });
        }

        window.onload = function () {
            connect();
            parseExistingHistory();
            const box = document.getElementById("chat-box");
            box.scrollTop = box.scrollHeight;
            
            document.getElementById("user-input").addEventListener("keypress", function (e) {
                if (e.key === 'Enter') sendMessage();
            });
        }
    </script>
</body>
</html>
