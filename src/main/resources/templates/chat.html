<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Neon AI — Support Portal</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Syne:wght@600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --sidebar-w: 270px;
            --header-h: 64px;
            --footer-h: 80px;
            --bg: #0a0f1e;
            --bg2: #111827;
            --bg3: #1a2236;
            --accent: #6366f1;
            --accent2: #818cf8;
            --border: rgba(255,255,255,0.07);
            --text: #f1f5f9;
            --muted: #94a3b8;
            --user-bubble: #6366f1;
            --ai-bubble: #1e2d45;
            --input-bg: #111827;
            --radius: 18px;
            --radius-sm: 10px;
        }

        html, body {
            height: 100%;
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
        }

        /* ── Layout ── */
        .layout {
            display: grid;
            grid-template-columns: var(--sidebar-w) 1fr;
            height: 100dvh;
            width: 100vw;
        }

        /* ── Sidebar ── */
        .sidebar {
            background: var(--bg2);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 1.5rem 1.25rem;
            height: 100%;
            z-index: 200;
            transition: transform 0.3s ease;
        }

        .sidebar-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 2rem;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background: var(--accent);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .logo-text {
            font-family: 'Syne', sans-serif;
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.3px;
        }

        .sidebar-section-label {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--muted);
            margin-bottom: 0.5rem;
        }

        .user-card {
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 0.875rem 1rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-avatar {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--accent), #a78bfa);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 0.85rem;
            color: white;
            flex-shrink: 0;
        }

        .user-info .user-name {
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text);
        }

        .user-info .user-role {
            font-size: 0.75rem;
            color: var(--muted);
        }

        .online-dot {
            width: 8px;
            height: 8px;
            background: #22c55e;
            border-radius: 50%;
            margin-left: auto;
            flex-shrink: 0;
            box-shadow: 0 0 6px #22c55e;
        }

        .sidebar-spacer { flex: 1; }

        .sidebar-actions { display: flex; flex-direction: column; gap: 8px; }

        .btn-sidebar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 0.6rem 1rem;
            border-radius: var(--radius-sm);
            font-size: 0.875rem;
            font-weight: 500;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            width: 100%;
            text-align: left;
        }

        .btn-sidebar-danger {
            background: rgba(239,68,68,0.08);
            color: #f87171;
            border-color: rgba(239,68,68,0.2);
        }

        .btn-sidebar-danger:hover {
            background: rgba(239,68,68,0.15);
            color: #fca5a5;
        }

        .btn-sidebar-ghost {
            background: var(--bg3);
            color: var(--muted);
            border-color: var(--border);
        }

        .btn-sidebar-ghost:hover {
            background: var(--bg);
            color: var(--text);
        }

        /* ── Chat Area ── */
        .chat-area {
            display: flex;
            flex-direction: column;
            height: 100dvh;
            min-width: 0;
            background: var(--bg);
        }

        .chat-header {
            height: var(--header-h);
            border-bottom: 1px solid var(--border);
            padding: 0 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--bg);
            flex-shrink: 0;
        }

        .chat-header-info h6 {
            font-family: 'Syne', sans-serif;
            font-weight: 600;
            font-size: 1rem;
            color: var(--text);
            margin: 0;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 0.72rem;
            color: #22c55e;
            margin-top: 2px;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            background: #22c55e;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .menu-btn {
            display: none;
            background: var(--bg3);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 8px;
            padding: 6px 10px;
            cursor: pointer;
            font-size: 1.1rem;
        }

        /* ── Messages ── */
        #chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            scroll-behavior: smooth;
        }

        #chat-box::-webkit-scrollbar { width: 4px; }
        #chat-box::-webkit-scrollbar-track { background: transparent; }
        #chat-box::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        .msg-wrapper {
            display: flex;
            gap: 10px;
            align-items: flex-end;
            animation: fadeUp 0.25s ease;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .msg-wrapper.user { flex-direction: row-reverse; }

        .msg-avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 600;
            flex-shrink: 0;
        }

        .msg-avatar.ai-av {
            background: var(--accent);
            color: white;
        }

        .msg-avatar.user-av {
            background: linear-gradient(135deg, #818cf8, #a78bfa);
            color: white;
        }

        .msg {
            max-width: 70%;
            padding: 0.75rem 1rem;
            border-radius: 16px;
            font-size: 0.9rem;
            line-height: 1.6;
            word-wrap: break-word;
            word-break: break-word;
        }

        .msg.user {
            background: var(--user-bubble);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .msg.ai {
            background: var(--ai-bubble);
            color: var(--text);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }

        .msg p { margin-bottom: 0.5rem; }
        .msg p:last-child { margin-bottom: 0; }

        pre {
            background: #0d1117;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 0.875rem;
            border-radius: 8px;
            margin: 0.5rem 0;
            overflow-x: auto;
        }

        code { font-size: 0.82rem; white-space: pre-wrap; word-break: break-all; }

        /* Typing indicator */
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 0.75rem 1rem;
            background: var(--ai-bubble);
            border: 1px solid var(--border);
            border-radius: 16px;
            border-bottom-left-radius: 4px;
            width: fit-content;
        }

        .typing-dot {
            width: 6px;
            height: 6px;
            background: var(--muted);
            border-radius: 50%;
            animation: bounce 1.2s infinite;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-6px); }
        }

        /* ── Input Area ── */
        .chat-footer {
            flex-shrink: 0;
            padding: 1rem 1.5rem;
            border-top: 1px solid var(--border);
            background: var(--bg);
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 6px 6px 6px 16px;
            transition: border-color 0.2s;
        }

        .input-wrapper:focus-within {
            border-color: var(--accent);
        }

        .input-wrapper input {
            flex: 1;
            border: none;
            background: transparent;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            outline: none;
            padding: 6px 0;
        }

        .input-wrapper input::placeholder { color: var(--muted); }

        .send-btn {
            width: 38px;
            height: 38px;
            background: var(--accent);
            border: none;
            border-radius: 10px;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
            transition: background 0.2s, transform 0.1s;
        }

        .send-btn:hover { background: var(--accent2); }
        .send-btn:active { transform: scale(0.95); }

        .send-btn svg { width: 18px; height: 18px; }

        .input-hint {
            text-align: center;
            font-size: 0.72rem;
            color: var(--muted);
            margin-top: 6px;
        }

        /* ── Overlay ── */
        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(2px);
            z-index: 150;
        }

        .overlay.active { display: block; }

        .close-sidebar-btn {
            display: none;
            background: none;
            border: none;
            color: var(--muted);
            font-size: 1.25rem;
            cursor: pointer;
            padding: 4px;
            margin-left: auto;
        }

        /* ── Responsive ── */
        @media (max-width: 768px) {
            .layout { grid-template-columns: 1fr; }

            .sidebar {
                position: fixed;
                left: 0;
                top: 0;
                height: 100%;
                width: 280px;
                transform: translateX(-100%);
            }

            .sidebar.open { transform: translateX(0); }

            .menu-btn { display: flex; align-items: center; gap: 6px; }

            .close-sidebar-btn { display: block; }

            .msg { max-width: 85%; }

            #chat-box { padding: 1rem; }

            .chat-header { padding: 0 1rem; }

            .chat-footer { padding: 0.75rem 1rem; }

            .sidebar-logo { justify-content: space-between; }
        }
    </style>
</head>

<body>

<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<div class="layout">

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-logo">
            <div class="logo-icon">⚡</div>
            <span class="logo-text">Neon AI</span>
            <button class="close-sidebar-btn" onclick="closeSidebar()">✕</button>
        </div>

        <p class="sidebar-section-label">Active Operator</p>
        <div class="user-card">
            <div class="user-avatar" id="avatarInitials">U</div>
            <div class="user-info">
                <div class="user-name" th:text="${username}">Username</div>
                <div class="user-role">Support Agent</div>
            </div>
            <div class="online-dot"></div>
        </div>

        <p class="sidebar-section-label">Session Info</p>
        <div style="background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 0.75rem 1rem; margin-bottom: 1.5rem;">
            <div style="display: flex; justify-content: space-between; font-size: 0.8rem; margin-bottom: 6px;">
                <span style="color: var(--muted);">Model</span>
                <span style="color: var(--text); font-weight: 500;">llama-3.1-8b</span>
            </div>
            <div style="display: flex; justify-content: space-between; font-size: 0.8rem;">
                <span style="color: var(--muted);">Engine</span>
                <span style="color: #22c55e; font-weight: 500;">Groq ⚡</span>
            </div>
        </div>

        <div class="sidebar-spacer"></div>

        <div class="sidebar-actions">
            <button class="btn-sidebar btn-sidebar-danger" onclick="clearChatHistory()">
                🗑️ Clear History
            </button>
            <a href="/logout" class="btn-sidebar btn-sidebar-ghost">
                🚪 Logout
            </a>
        </div>
    </aside>

    <!-- Main Chat -->
    <div class="chat-area">

        <div class="chat-header">
            <div style="display: flex; align-items: center; gap: 12px;">
                <button class="menu-btn" onclick="openSidebar()">☰ Menu</button>
                <div class="chat-header-info">
                    <h6>Live AI Chat Agent</h6>
                    <div class="status-badge">
                        <div class="status-dot"></div>
                        Groq Engine Active
                    </div>
                </div>
            </div>
        </div>

        <div id="chat-box">
            <!-- Welcome message if empty -->
            <div id="welcome-msg" style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 12px; opacity: 0.5;">
                <div style="font-size: 2.5rem;">⚡</div>
                <p style="font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 600; color: var(--text);">How can I help you today?</p>
                <p style="font-size: 0.82rem; color: var(--muted);">Ask me anything — I'm powered by Groq AI</p>
            </div>

            <!-- History messages rendered by Thymeleaf -->
            <th:block th:each="msg : ${history}">
                <div class="msg-wrapper" th:classappend="${msg.sender == 'USER'} ? 'user' : ''">
                    <div class="msg-avatar" th:classappend="${msg.sender == 'USER'} ? 'user-av' : 'ai-av'"
                         th:text="${msg.sender == 'USER'} ? 'U' : 'AI'"></div>
                    <div class="msg markdown-content"
                         th:classappend="${msg.sender == 'USER'} ? 'user' : 'ai'"
                         th:data-sender="${msg.sender}"
                         th:text="${msg.content}"></div>
                </div>
            </th:block>
        </div>

        <div class="chat-footer">
            <div class="input-wrapper">
                <input type="text" id="user-input" placeholder="Type your message..." autocomplete="off">
                <button class="send-btn" onclick="sendMessage()" aria-label="Send message">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
            <p class="input-hint">Press Enter to send · Powered by Groq Cloud</p>
        </div>

    </div>
</div>

<script>
    let stompClient = null;

    function openSidebar() {
        document.getElementById('sidebar').classList.add('open');
        document.getElementById('overlay').classList.add('active');
    }

    function closeSidebar() {
        document.getElementById('sidebar').classList.remove('open');
        document.getElementById('overlay').classList.remove('active');
    }

    function setAvatarInitials() {
        const nameEl = document.querySelector('.user-name');
        if (nameEl) {
            const name = nameEl.textContent.trim();
            const initials = name.slice(0, 2).toUpperCase();
            document.getElementById('avatarInitials').textContent = initials;
        }
    }

    function connect() {
        const socket = new SockJS('/ws-chat');
        stompClient = Stomp.over(socket);
        stompClient.debug = null;
        stompClient.connect({}, function () {
            stompClient.subscribe('/user/queue/messages', function (msgOutput) {
                removeTypingIndicator();
                const msg = JSON.parse(msgOutput.body);
                renderMessage(msg.content, msg.sender);
            });
        });
    }

    function sendMessage() {
        const input = document.getElementById('user-input');
        const val = input.value.trim();
        if (val && stompClient) {
            hideWelcome();
            stompClient.send('/app/chat.sendMessage', {}, JSON.stringify({ content: val, sender: 'USER' }));
            renderMessage(val, 'USER');
            showTypingIndicator();
            input.value = '';
        }
    }

    function hideWelcome() {
        const w = document.getElementById('welcome-msg');
        if (w) w.style.display = 'none';
    }

    function showTypingIndicator() {
        removeTypingIndicator();
        const box = document.getElementById('chat-box');
        const wrapper = document.createElement('div');
        wrapper.className = 'msg-wrapper';
        wrapper.id = 'typing-wrapper';
        wrapper.innerHTML = `
            <div class="msg-avatar ai-av">AI</div>
            <div class="typing-indicator">
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
            </div>`;
        box.appendChild(wrapper);
        box.scrollTop = box.scrollHeight;
    }

    function removeTypingIndicator() {
        const el = document.getElementById('typing-wrapper');
        if (el) el.remove();
    }

    function clearChatHistory() {
        if (confirm('Permanently wipe all chat history for this account?')) {
            fetch('/api/chat/clear', { method: 'DELETE' }).then(r => {
                if (r.ok) {
                    document.getElementById('chat-box').innerHTML = `
                        <div id="welcome-msg" style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 12px; opacity: 0.5;">
                            <div style="font-size: 2.5rem;">⚡</div>
                            <p style="font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 600; color: var(--text);">How can I help you today?</p>
                            <p style="font-size: 0.82rem; color: var(--muted);">Ask me anything — I'm powered by Groq AI</p>
                        </div>`;
                    closeSidebar();
                }
            });
        }
    }

    function renderMessage(content, sender) {
        hideWelcome();
        const box = document.getElementById('chat-box');

        if (sender === 'USER') {
            const existing = box.querySelectorAll('.msg.user');
            if (existing.length > 0 && existing[existing.length - 1].textContent === content) return;
        }

        const wrapper = document.createElement('div');
        wrapper.className = 'msg-wrapper' + (sender === 'USER' ? ' user' : '');

        const avatar = document.createElement('div');
        avatar.className = 'msg-avatar ' + (sender === 'USER' ? 'user-av' : 'ai-av');
        avatar.textContent = sender === 'USER' ? 'U' : 'AI';

        const bubble = document.createElement('div');
        bubble.className = 'msg ' + (sender === 'USER' ? 'user' : 'ai');

        if (sender === 'AI') {
            bubble.innerHTML = marked.parse(content);
            bubble.querySelectorAll('pre code').forEach(b => hljs.highlightElement(b));
        } else {
            bubble.textContent = content;
        }

        wrapper.appendChild(avatar);
        wrapper.appendChild(bubble);
        box.appendChild(wrapper);
        box.scrollTop = box.scrollHeight;
    }

    function parseHistory() {
        document.querySelectorAll('.markdown-content').forEach(el => {
            if (el.getAttribute('data-sender') === 'AI') {
                el.innerHTML = marked.parse(el.textContent);
                el.querySelectorAll('pre code').forEach(b => hljs.highlightElement(b));
            }
        });
        if (document.querySelectorAll('.msg-wrapper').length > 0) {
            hideWelcome();
        }
    }

    window.onload = function () {
        connect();
        parseHistory();
        setAvatarInitials();
        const box = document.getElementById('chat-box');
        box.scrollTop = box.scrollHeight;

        document.getElementById('user-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') sendMessage();
        });
    };
</script>

</body>
</html>
