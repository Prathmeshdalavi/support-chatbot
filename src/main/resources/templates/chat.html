<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>AI Agent Support Portal</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8f9fa;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar Container Styling */
        .sidebar {
            background-color: #1e293b;
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* Main Chat Area Dashboard Layout */
        .chat-layout {
            height: 100vh;
            display: flex;
            flex-direction: column;
            background-color: #ffffff;
        }

        .chat-header {
            border-bottom: 1px solid #e2e8f0;
            padding: 1.5rem;
            background-color: #ffffff;
        }

        #chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
            background-color: #f8fafc;
            display: flex;
            flex-direction: column;
        }

        /* Message Bubbles Enhancements */
        .msg {
            max-width: 75%;
            padding: 0.85rem 1.25rem;
            border-radius: 1rem;
            margin-bottom: 1rem;
            line-height: 1.5;
            font-size: 0.95rem;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        .msg.user {
            background-color: #3b82f6;
            color: #ffffff;
            align-self: flex-end;
            border-bottom-right-radius: 0.25rem;
        }

        .msg.ai {
            background-color: #ffffff;
            color: #1e293b;
            align-self: flex-start;
            border-bottom-left-radius: 0.25rem;
            border: 1px solid #e2e8f0;
        }

        .msg p { margin-bottom: 0; }
        
        /* Formatted Code Block Styling */
        pre { 
            background-color: #0f172a; 
            padding: 1rem; 
            border-radius: 0.5rem; 
            margin-top: 0.5rem; 
            overflow-x: auto;
        }
        code { font-size: 0.875rem; }

        .chat-footer {
            padding: 1.5rem;
            background-color: #ffffff;
            border-top: 1px solid #e2e8f0;
        }

        .input-group-custom {
            background-color: #f1f5f9;
            border-radius: 0.75rem;
            padding: 0.35rem;
            display: flex;
            align-items: center;
            border: 1px solid #cbd5e1;
        }

        .input-group-custom input {
            border: none;
            background: transparent;
            box-shadow: none !important;
            padding-left: 1rem;
        }
    </style>
</head>

<body>
    <div class="container-fluid p-0">
        <div class="row g-0">
            <div class="col-md-3 col-lg-2 sidebar p-4 d-none d-md-flex">
                <div>
                    <h5 class="fw-bold mb-4 text-primary-gradient text-white">⚡ Neon AI Portal</h5>
                    <hr class="text-secondary">
                    <div class="mb-4">
                        <small class="text-uppercase text-secondary d-block mb-1 font-monospace">User Session</small>
                        <span class="fw-medium text-light" th:text="${username}">User</span>
                    </div>
                </div>
                
                <div class="d-grid gap-2">
                    <button id="clearChatBtn" onclick="clearChatHistory()" class="btn btn-outline-danger w-100 border-2">
                        🗑️ Clear History
                    </button>
                    <a href="/logout" class="btn btn-danger w-100">Logout</a>
                </div>
            </div>

            <div class="col-md-9 col-lg-10 chat-layout">
                <div class="chat-header d-flex justify-content-between align-items-center shadow-sm">
                    <div>
                        <h6 class="fw-bold mb-0 text-dark">Live AI Chat Agent</h6>
                        <small class="text-success font-monospace">● Connected to Groq Engine Cloud</small>
                    </div>
                </div>

                <div id="chat-box">
                    <div th:each="msg : ${history}" 
                         th:class="${msg.sender == 'USER'} ? 'msg user' : 'msg ai'"
                         th:data-sender="${msg.sender}"
                         class="markdown-content"
                         th:text="${msg.content}">
                    </div>
                </div>

                <div class="chat-footer">
                    <div class="input-group-custom shadow-sm">
                        <input type="text" id="user-input" class="form-control" placeholder="Ask your system assistant a question...">
                        <button class="btn btn-primary px-4 py-2 rounded-3 fw-medium" onclick="sendMessage()">Send</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let stompClient = null;

        function connect() {
            const socket = new SockJS('/ws-chat');
            stompClient = Stomp.over(socket);
            stompClient.connect({}, function (frame) {
                stompClient.subscribe('/user/queue/messages', function (msgOutput) {
                    const msg = JSON.parse(msgOutput.body);
                    renderMessage(msg.content, msg.sender);
                });
            });
        }

        function sendMessage() {
            const input = document.getElementById("user-input");
            const val = input.value.trim();
            if (val && stompClient) {
                const messagePayload = {
                    'content': val,
                    'sender': 'USER'
                };
                stompClient.send("/app/chat.sendMessage", {}, JSON.stringify(messagePayload));
                
                // Render user bubble instantly locally
                renderMessage(val, 'USER');
                input.value = "";
            }
        }

        function clearChatHistory() {
            if (confirm("Are you sure you want to clear all your chat history?")) {
                fetch('/api/chat/clear', {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json' }
                })
                .then(response => {
                    if (response.ok) {
                        document.getElementById("chat-box").innerHTML = "";
                    } else {
                        alert("Failed to clear chat history.");
                    }
                })
                .catch(error => console.error('Error clearing chat:', error));
            }
        }

        function renderMessage(content, sender) {
            const chatContainer = document.getElementById("chat-box");
            
            // Check if the exact message element already exists in the viewport to prevent dual-rendering bugs
            if (sender === "USER") {
                const existingUserMsgs = chatContainer.querySelectorAll('.msg.user');
                if (existingUserMsgs.length > 0 && existingUserMsgs[existingUserMsgs.length - 1].textContent === content) {
                    return; // Abort double insertion
                }
            }

            const messageElement = document.createElement("div");
            messageElement.className = sender === "USER" ? "msg user" : "msg ai";

            if (sender === "AI") {
                messageElement.innerHTML = marked.parse(content);
            } else {
                messageElement.textContent = content;
            }

            chatContainer.appendChild(messageElement);

            messageElement.querySelectorAll('pre code').forEach((block) => {
                hljs.highlightElement(block);
            });

            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function parseExistingHistory() {
            document.querySelectorAll(".markdown-content").forEach(el => {
                const sender = el.getAttribute("data-sender");
                if (sender === "AI") {
                    const rawText = el.textContent;
                    el.innerHTML = marked.parse(rawText);
                    el.querySelectorAll('pre code').forEach((block) => {
                        hljs.highlightElement(block);
                    });
                }
            });
        }

        window.onload = function () {
            connect();
            parseExistingHistory();
            const box = document.getElementById("chat-box");
            box.scrollTop = box.scrollHeight;
            
            document.getElementById("user-input").addEventListener("keypress", function (e) {
                if (e.key === 'Enter') sendMessage();
            });
        }
    </script>
</body>
</html>
