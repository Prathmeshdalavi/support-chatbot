<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>AI Agent Support Portal</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- Bootstrap 5 CSS & JS Bundles -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Google Fonts for Modern Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Code Highlight & Markdown Support -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    
    <!-- STOMP & SockJS for WebSockets -->
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8f9fa;
            height: 100vh;
            /* Support for mobile browser address bars */
            height: -webkit-fill-available; 
            margin: 0;
            overflow: hidden;
        }

        .wrapper {
            display: flex;
            height: 100vh;
            height: -webkit-fill-available;
            width: 100vw;
            position: relative;
            overflow: hidden;
        }

        /* Responsive Sidebar Panel */
        .sidebar {
            background-color: #1e293b;
            color: #f8fafc;
            width: 260px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 1.5rem;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1040;
            height: 100%;
        }

        /* Main Chat Area Layout Container */
        .chat-layout {
            flex-grow: 1;
            height: 100%;
            display: flex;
            flex-direction: column;
            background-color: #ffffff;
            min-width: 0;
            position: relative;
        }

        .chat-header {
            border-bottom: 1px solid #e2e8f0;
            padding: 1rem;
            background-color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        #chat-box {
            flex: 1 1 auto;
            overflow-y: auto;
            padding: 1rem;
            background-color: #f8fafc;
            display: flex;
            flex-direction: column;
        }

        /* Message Bubbles Responsive Enhancements */
        .msg {
            max-width: 85%;
            padding: 0.75rem 1.15rem;
            border-radius: 1rem;
            margin-bottom: 1rem;
            line-height: 1.5;
            font-size: 0.95rem;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            word-wrap: break-word;
            word-break: break-word;
        }

        .msg.user {
            background-color: #3b82f6;
            color: #ffffff;
            align-self: flex-end;
            border-bottom-right-radius: 0.25rem;
        }

        .msg.ai {
            background-color: #ffffff;
            color: #1e293b;
            align-self: flex-start;
            border-bottom-left-radius: 0.25rem;
            border: 1px solid #e2e8f0;
        }

        .msg p { margin-bottom: 0; }
        
        pre { 
            background-color: #0f172a; 
            padding: 0.85rem; 
            border-radius: 0.5rem; 
            margin-top: 0.5rem; 
            overflow-x: auto;
            max-width: 100%;
        }
        code { font-size: 0.85rem; white-space: pre-wrap; word-break: break-all; }

        .chat-footer {
            padding: 1rem;
            background-color: #ffffff;
            border-top: 1px solid #e2e8f0;
            flex-shrink: 0;
        }

        .input-group-custom {
            background-color: #f1f5f9;
            border-radius: 0.75rem;
            padding: 0.35rem;
            display: flex;
            align-items: center;
            border: 1px solid #cbd5e1;
            width: 100%;
        }

        .input-group-custom input {
            border: none;
            background: transparent;
            box-shadow: none !important;
            padding-left: 0.75rem;
            font-size: 0.95rem;
            flex-grow: 1;
        }

        /* ==========================================
           HYBRID MOBILE & DESKTOP-SITE OVERRIDES
           ========================================== */
        @media (max-width: 991px) {
            .sidebar {
                position: absolute;
                transform: translateX(-100%);
            }
            
            .sidebar.active {
                transform: translateX(0);
            }

            .msg {
                max-width: 90%;
            }
        }
    </style>
</head>

<body>
    <div class="wrapper">
        
        <!-- SIDEBAR DRAWER -->
        <div class="sidebar" id="sidebarMenu">
            <div>
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h5 class="fw-bold text-white m-0">⚡ Neon AI</h5>
                    <button class="btn-close btn-close-white" onclick="toggleMobileSidebar()"></button>
                </div>
                <hr class="text-secondary">
                <div class="mb-4">
                    <small class="text-uppercase text-secondary d-block mb-1 font-monospace" style="font-size:0.75rem;">Active Session</small>
                    <span class="fw-medium text-light" th:text="${username}">User</span>
                </div>
            </div>
            
            <div class="d-grid gap-2">
                <button id="clearChatBtn" onclick="clearChatHistory()" class="btn btn-outline-danger w-100 border-2">
                    🗑️ Clear History
                </button>
                <a href="/logout" class="btn btn-danger w-100">Logout</a>
            </div>
        </div>

        <!-- MAIN VIEW PANELS -->
        <div class="chat-layout">
            <div class="chat-header shadow-sm">
                <div class="d-flex align-items-center">
                    <!-- Always visible toggle menu to fix mobile layout breaks -->
                    <button class="btn btn-outline-dark me-3 px-2 py-1" onclick="toggleMobileSidebar()">
                        ☰ Menu
                    </button>
                    <div>
                        <h6 class="fw-bold mb-0 text-dark">Live AI Chat Agent</h6>
                        <small class="text-success font-monospace" style="font-size:0.8rem;">● Groq Engine Live</small>
                    </div>
                </div>
            </div>

            <!-- MESSAGES CONTAINER VIEWPORT -->
            <div id="chat-box">
                <div th:each="msg : ${history}" 
                     th:class="${msg.sender == 'USER'} ? 'msg user' : 'msg ai'"
                     th:data-sender="${msg.sender}"
                     class="markdown-content"
                     th:text="${msg.content}">
                </div>
            </div>

            <!-- STICKY INPUT CONTAINER PANEL -->
            <div class="chat-footer">
                <div class="input-group-custom shadow-sm">
                    <input type="text" id="user-input" class="form-control" placeholder="Ask a question...">
                    <button class="btn btn-primary px-3 py-2 rounded-3 fw-medium" onclick="sendMessage()">Send</button>
                </div>
            </div>
        </div>

    </div>

    <!-- Backdrop overlay container -->
    <div id="sidebarOverlay" onclick="toggleMobileSidebar()" style="display:none; position:absolute; top:0; left:0; width:100vw; height:100vh; background:rgba(0,0,0,0.4); z-index:1030;"></div>

    <script>
        let stompClient = null;

        function toggleMobileSidebar() {
            const sidebar = document.getElementById("sidebarMenu");
            const overlay = document.getElementById("sidebarOverlay");
            
            if (sidebar.classList.contains("active")) {
                sidebar.classList.remove("active");
                overlay.style.display = "none";
            } else {
                sidebar.classList.add("active");
                overlay.style.display = "block";
            }
        }

        function connect() {
            const socket = new SockJS('/ws-chat');
            stompClient = Stomp.over(socket);
            stompClient.connect({}, function (frame) {
                stompClient.subscribe('/user/queue/messages', function (msgOutput) {
                    const msg = JSON.parse(msgOutput.body);
                    renderMessage(msg.content, msg.sender);
                });
            });
        }

        function sendMessage() {
            const input = document.getElementById("user-input");
            const val = input.value.trim();
            if (val && stompClient) {
                const messagePayload = {
                    'content': val,
                    'sender': 'USER'
                };
                stompClient.send("/app/chat.sendMessage", {}, JSON.stringify(messagePayload));
                renderMessage(val, 'USER');
                input.value = "";
            }
        }

        function clearChatHistory() {
            if (confirm("Are you sure you want to clear all your chat history?")) {
                fetch('/api/chat/clear', {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json' }
                })
                .then(response => {
                    if (response.ok) {
                        document.getElementById("chat-box").innerHTML = "";
                        toggleMobileSidebar();
                    } else {
                        alert("Failed to clear chat history.");
                    }
                })
                .catch(error => console.error('Error clearing chat:', error));
            }
        }

        function renderMessage(content, sender) {
            const chatContainer = document.getElementById("chat-box");
            
            if (sender === "USER") {
                const existingUserMsgs = chatContainer.querySelectorAll('.msg.user');
                if (existingUserMsgs.length > 0 && existingUserMsgs[existingUserMsgs.length - 1].textContent === content) {
                    return;
                }
            }

            const messageElement = document.createElement("div");
            messageElement.className = sender === "USER" ? "msg user" : "msg ai";

            if (sender === "AI") {
                messageElement.innerHTML = marked.parse(content);
            } else {
                messageElement.textContent = content;
            }

            chatContainer.appendChild(messageElement);

            messageElement.querySelectorAll('pre code').forEach((block) => {
                hljs.highlightElement(block);
            });

            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function parseExistingHistory() {
            document.querySelectorAll(".markdown-content").forEach(el => {
                const sender = el.getAttribute("data-sender");
                if (sender === "AI") {
                    const rawText = el.textContent;
                    el.innerHTML = marked.parse(rawText);
                    el.querySelectorAll('pre code').forEach((block) => {
                        hljs.highlightElement(block);
                    });
                }
            });
        }

        window.onload = function () {
            connect();
            parseExistingHistory();
            const box = document.getElementById("chat-box");
            box.scrollTop = box.scrollHeight;
            
            document.getElementById("user-input").addEventListener("keypress", function (e) {
                if (e.key === 'Enter') sendMessage();
            });
        }
    </script>
</body>
</html>
