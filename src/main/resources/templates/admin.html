<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin System Audit Logs</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .dashboard-header { background-color: #1e293b; color: white; padding: 1.5rem 1rem; }
    </style>
</head>
<body>

<div class="dashboard-header shadow-sm">
    <div class="container-fluid d-flex flex-column flex-sm-row justify-content-between align-items-start align-items-sm-center gap-3">
        <div>
            <h4 class="fw-bold mb-0">🛡️ Control Center System Logs</h4>
            <p class="text-secondary small mb-0">Reviewing Neon DB persistence pipelines</p>
        </div>
        <div class="d-flex gap-2 w-100 w-sm-auto">
            <a href="/chat" class="btn btn-primary btn-sm flex-grow-1 px-3">Go to Chat</a>
            <a href="/logout" class="btn btn-danger btn-sm px-3">Logout</a>
        </div>
    </div>
</div>

<div class="container-fluid my-4">
    <div class="card border-0 shadow-sm rounded-3">
        <div class="card-body p-3 p-md-4">
            <h5 class="fw-bold mb-3 text-dark">Global Chat Database Records</h5>
            
            <!-- Table Container wrapping context with horizontal swipe allowance on phone display matrices -->
            <div class="table-responsive">
                <table class="table table-striped table-hover align-middle mb-0" style="min-width: 600px;">
                    <thead class="table-dark">
                        <tr>
                            <th style="width: 8%;">ID</th>
                            <th style="width: 15%;">Sender Identity</th>
                            <th>Message String Content Output</th>
                            <th style="width: 22%;">Timestamp Block</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="msg : ${allMessages}">
                            <td class="font-monospace text-secondary" th:text="${msg.id}">1</td>
                            <td>
                                <span th:class="${msg.sender == 'USER'} ? 'badge bg-primary px-2 py-1' : 'badge bg-secondary px-2 py-1'" 
                                      th:text="${msg.sender}">USER</span>
                            </td>
                            <td class="text-wrap text-break fw-medium text-dark" th:text="${msg.content}">Message Content Here</td>
                            <td class="small text-muted font-monospace" th:text="${msg.timestamp}">2026-06-05 12:00:00</td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(allMessages)}">
                            <td colspan="4" class="text-center py-4 text-muted small">No global logs recorded in cluster tables yet.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
            
        </div>
    </div>
</div>

</body>
</html>
